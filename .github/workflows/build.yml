name: Build TX Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            wget \
            curl \
            xz-utils \
            unzip \
            git
      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r28-linux.zip -O ndk.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$GITHUB_WORKSPACE/android-ndk-r28" >> $GITHUB_ENV
      - name: Verify NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          test -d "$ANDROID_NDK_HOME"
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang --version

      - name: Make build script executable
        run: chmod +x scripts/build

      - name: Build TX Runtime
        run: ./scripts/build

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: tx-runtime
          path: runtime/
